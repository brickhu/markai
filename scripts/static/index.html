<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>MarkAI</title>
<style>
body{font-family:sans-serif;background:#111;color:#ddd;padding:20px;max-width:800px;margin:0 auto}
h1{color:#a78bfa}
.bar{display:flex;gap:10px;margin:16px 0}
.bar input{flex:1;padding:10px;border:1px solid #333;border-radius:6px;background:#1a1a2e;color:#ddd;font-size:15px}
.bar button{padding:10px 20px;background:#7c3aed;color:#fff;border:none;border-radius:6px;cursor:pointer}
.st{color:#888;margin-bottom:16px}
.entry{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer}
.entry:hover{border-color:#7c3aed}
.t{font-size:16px;font-weight:600;margin-bottom:4px}
.d{font-size:14px;color:#aaa;margin:-bottom:4px}
.tag{display:inline-block;background:#333;border-radius:8px;padding:2px 8px;font-size:11px;color:#a78bfa;margin:2px}
.lm{text-align:center;padding:12px;color:#888;cursor:pointer}
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.md.s{display:flex}
.mc{background:#1a1a2e;border:1px solid #333;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.mc h2{color:#a78bfa;margin-bottom:12px}
.f{margin-bottom:10px}
.fl{font-size:12px;color:#666}
.fv{font-size:15px;color:#ddd;word-break:break-all}
.x{float:right;background:none;border:none;color:#888;font-size:22px;cursor:pointer}
#ft{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
#ft button{padding:4px 12px;border:1px solid #333;border-radius:12px;background:transparent;color:#a78bfa;cursor:pointer;font-size:12px}
#ft button.s{border-color:#7c3aed;background:#7c3aed22}
</style></head>
<body>
<h1>MarkAI</h1>
<div id="ft"><button class="s" onclick="home()">全部</button></div>
<div class="bar"><input id="q" placeholder="搜索..." onkeydown="if(event.key==='Enter')fq()"><button onclick="fq()">搜索</button></div>
<div class="st" id="st"></div>
<div id="list"></div>
<div class="lm" id="lm" onclick="more()">加载更多</div>
<div class="md" id="md" onclick="if(event.target==this)hm()"><div class="mc" id="mc"></div></div>
<script>
var A=[],N=0;
function $(id){return document.getElementById(id)}
function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function home(){$('q').value='';$('list').innerHTML='<p style="padding:20px;text-align:center;color:#888">loading...</p>';fetch('/api/list?limit=99999').then(function(r){return r.json()}).then(function(d){A=d.entries||d;N=0;$('list').innerHTML='';more()}).catch(function(e){$('st').textContent='Err: '+JSON.stringify(e)})}
function ft(t){fetch('/api/typed?subtype='+t+'&limit=99999').then(function(r){return r.json()}).then(function(d){A=d.entries||d;N=0;$('list').innerHTML='';more()}).catch(function(e){$('st').textContent='Err: '+JSON.stringify(e)})}
function fq(){var v=$('q').value.trim();if(!v)return home();$('list').innerHTML='<p style="padding:20px;text-align:center;color:#888">loading...</p>';fetch('/api/search?q='+encodeURIComponent(v)+'&limit=99999').then(function(r){return r.json()}).then(function(d){A=d.entries||d;N=0;$('list').innerHTML='';more()}).catch(function(e){$('st').textContent='Err: '+JSON.stringify(e)})}
function more(){var nx=Math.min(N+20,A.length),h='';for(var i=N;i<nx;i++){var e=A[i];if(!e)continue;h+='<div class="entry" data-id="'+e.id+'"><div class="t">'+esc(e.title)+'</div>';if(e.content_subtype)h+='<span class="tag" style="color:#7c3aed">'+esc(e.content_subtype)+'</span>';if(e.tags)for(var j=0;j<e.tags.length;j++)h+='<span class="tag">'+esc(e.tags[j])+'</span>';if(e.summary)h+='<div class="d">'+esc(e.summary)+'</div>';h+='</div>'}if(h){$('list').innerHTML+=h;N=nx;$('st').textContent=A.length+' entries, showing '+N;$('lm').style.display=(N<A.length)?'block':'none'}}
function vd(id){fetch('/api/get?id='+id).then(function(r){return r.json()}).then(function(e){if(!e||e.error)return;var h='<button class="x" onclick="hm()">x</button><h2>'+esc(e.title)+'</h2>';if(e.content_subtype)h+='<div class="f"><div class="fl">Type</div><div class="fv">'+esc(e.content_subtype)+'</div></div>';if(e.tags&&e.tags.length){h+='<div class="f"><div class="fl">Tags</div><div class="fv">';for(var i=0;i<e.tags.length;i++)h+='<span class="tag">'+esc(e.tags[i])+'</span>';h+='</div></div>'}if(e.summary)h+='<div class="f"><div class="fl">Summary</div><div class="fv">'+esc(e.summary)+'</div></div>';h+='<div class="f"><div class="fl">Content</div><div class="fv">'+esc(e.content||'')+'</div></div>';$('mc').innerHTML=h;$('md').classList.add('s')}).catch(function(e){$('st').textContent='Err: '+JSON.stringify(e)})}
function hm(){$('md').classList.remove('s')}

// Event delegation for entry clicks
$('list').addEventListener('click',function(ev){
  var el=ev.target;
  while(el&&el.tagName!=='DIV')el=el.parentNode;
  if(!el||!el.dataset||!el.dataset.id)return;
  vd(el.dataset.id);
});

// Init
fetch('/api/types').then(function(r){return r.json()}).then(function(t){var f=$('ft');for(var i=0;i<t.length;i++){(function(ti){var b=document.createElement('button');b.textContent=ti.subtype+'('+ti.count+')';b.onclick=function(){var all=document.querySelectorAll('#ft button');for(var j=0;j<all.length;j++)all[j].classList.remove('s');b.classList.add('s');ft(ti.subtype)};f.appendChild(b)})(t[i])}home()}).catch(function(e){$('st').textContent='InitErr: '+JSON.stringify(e)});
</script></body></html>
