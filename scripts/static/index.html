<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MarkAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px;max-width:960px;margin:0 auto}
h1{font-size:24px;margin-bottom:20px;color:#a78bfa}
.bar{display:flex;gap:10px;margin-bottom:20px}
.bar input{flex:1;padding:12px;border:1px solid #2a2a3e;border-radius:8px;background:#1a1a2e;color:#e0e0e0;font-size:16px;outline:none}
.bar input:focus{border-color:#7c3aed}
.bar button{padding:12px 24px;background:#7c3aed;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px}
.ft{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.ft button{padding:6px 14px;border:1px solid #2a2a3e;border-radius:16px;background:transparent;color:#a78bfa;cursor:pointer;font-size:13px}
.ft button.sel,.ft button:hover{background:#7c3aed22;border-color:#7c3aed}
.s{color:#888;font-size:13px;margin-bottom:16px}
.c{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:10px;padding:16px;margin-bottom:12px;cursor:pointer}
.c:hover{border-color:#7c3aed}
.t{font-size:16px;font-weight:600;margin-bottom:6px}
.d{font-size:14px;color:#aaa;line-height:1.5}
.tag{display:inline-block;padding:2px 8px;background:#2a2a3e;border-radius:10px;font-size:11px;color:#a78bfa;margin:2px}
.st{display:inline-block;padding:2px 8px;background:#7c3aed22;border-radius:10px;font-size:11px;color:#7c3aed;margin:2px}
.lm{text-align:center;padding:16px;color:#888;cursor:pointer}
.lm:hover{color:#a78bfa}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000000aa;z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.mc{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.mc h2{color:#a78bfa;margin-bottom:12px;font-size:18px}
.fi{margin-bottom:10px}
.fl{font-size:12px;color:#666;margin-bottom:2px}
.fv{font-size:15px;color:#e0e0e0;word-break:break-all}
.x{float:right;background:none;border:none;color:#888;font-size:22px;cursor:pointer}
.x:hover{color:#fff}
</style>
</head>
<body>
<h1>MarkAI</h1>
<div class="ft" id="ft"><button class="sel" onclick="reset()">全部</button></div>
<div class="bar">
<input id="q" placeholder="搜索..." onkeydown="if(event.key==='Enter')dosearch()">
<button onclick="dosearch()">搜索</button>
</div>
<div class="s" id="stats"></div>
<div id="list"></div>
<div class="lm" id="lm" onclick="more()">加载更多</div>
<div class="modal" id="modal" onclick="if(event.target==this)hide()"><div class="mc" id="mc"></div></div>

<script>
var items=[], shown=0, mode='', q='';

function api(u){return fetch(u).then(function(r){return r.json()})}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function reset(){
  mode='all';q='';document.getElementById('q').value='';
  api('/api/list?limit=99999').then(function(d){
    items=d.entries||d;shown=0;document.getElementById('list').innerHTML='';more();
  });
}

function loadtype(t){
  mode='type';q='';document.getElementById('q').value='';
  api('/api/typed?subtype='+t+'&limit=99999').then(function(d){
    items=d.entries||d;shown=0;document.getElementById('list').innerHTML='';more();
  });
}

function dosearch(){
  var v=document.getElementById('q').value.trim();
  if(!v)return reset();mode='search';q=v;
  api('/api/search?q='+encodeURIComponent(v)+'&limit=99999').then(function(d){
    items=d.entries||d;shown=0;document.getElementById('list').innerHTML='';more();
  });
}

function more(){
  var nxt=Math.min(shown+20,items.length),html='';
  for(var i=shown;i<nxt;i++){
    var e=items[i];
    html+='<div class="c" data-i="'+i+'"><div class="t">'+esc(e.title)+'</div>';
    if(e.content_subtype)html+='<span class="st">'+esc(e.content_subtype)+'</span>';
    if(e.tags)for(var j=0;j<e.tags.length;j++)html+='<span class="tag">'+esc(e.tags[j])+'</span>';
    if(e.summary)html+='<div class="d">'+esc(e.summary)+'</div>';
    html+='</div>';
  }
  document.getElementById('list').innerHTML+=html;
  shown=nxt;
  document.getElementById('stats').textContent='共 '+items.length+' 条';
  document.getElementById('lm').style.display=(shown<items.length)?'block':'none';
}

// Event delegation - click on #list
document.getElementById('list').onclick=function(ev){
  var el=ev.target;
  while(el&&!el.classList.contains('c'))el=el.parentNode;
  if(!el||!el.dataset||!el.dataset.i)return;
  var idx=parseInt(el.dataset.i);
  if(idx>=0&&idx<items.length){
    var e=items[idx];
    api('/api/get?id='+e.id).then(function(e){
      if(!e||e.error)return;
      var mc=document.getElementById('mc'),h='<button class="x" onclick="hide()">x</button><h2>'+esc(e.title)+'</h2>';
      if(e.content_subtype)h+='<div class="fi"><div class="fl">类型</div><div class="fv">'+esc(e.content_subtype)+'</div></div>';
      if(e.tags&&e.tags.length){var th='';for(var i=0;i<e.tags.length;i++)th+='<span class="tag">'+esc(e.tags[i])+'</span>';h+='<div class="fi"><div class="fl">标签</div><div class="fv">'+th+'</div></div>'}
      if(e.summary)h+='<div class="fi"><div class="fl">摘要</div><div class="fv">'+esc(e.summary)+'</div></div>';
      h+='<div class="fi"><div class="fl">内容</div><div class="fv">'+esc(e.content||'')+'</div></div>';
      if(e.source_url)h+='<div class="fi"><div class="fl">来源</div><div><a href="'+esc(e.source_url)+'" target="_blank" style="color:#60a5fa">'+esc(e.source_url)+'</a></div></div>';
      h+='<div class="fi" style="margin-top:12px;color:#555;font-size:12px">'+esc(e.id)+' | '+esc((e.created_at||'').slice(0,10))+'</div>';
      mc.innerHTML=h;document.getElementById('modal').classList.add('show');
    });
  }
};

function hide(){document.getElementById('modal').classList.remove('show')}

// Init: build filter buttons and load
api('/api/types').then(function(types){
  var ft=document.getElementById('ft');
  for(var i=0;i<types.length;i++){
    (function(t){
      var b=document.createElement('button');
      b.textContent=t.subtype+'('+t.count+')';
      b.onclick=function(){
        document.querySelectorAll('#ft button').forEach(function(x){x.classList.remove('sel')});
        b.classList.add('sel');loadtype(t.subtype);
      };
      ft.appendChild(b);
    })(types[i]);
  }
  reset();
});
</script>
</body>
</html>
